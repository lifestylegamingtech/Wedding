<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Tayedzerwa Wedding 2028</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="hero">
  <h1>Albiee & Beth</h1>
  <p>We’re getting married</p>
  <span>29 June 2028</span>
</section>

<section class="scratch-section">
  <h2>Scratch to reveal 💍</h2>

  <div class="scratch-card">
    <div class="revealed">
      <h3>Ceremony</h3>
      <p>2:00 PM</p>
      <p>The William Cecil, Stamford</p>
    </div>
    <canvas class="scratchCanvas" width="300" height="180"></canvas>
  </div>

  <div class="scratch-card">
    <div class="revealed">
      <h3>Days to go</h3>
      <p class="scratch-countdown"></p>
    </div>
    <canvas class="scratchCanvas" width="300" height="180"></canvas>
  </div>

  <div class="scratch-card">
    <div class="revealed">
      <h3>Dress code</h3>
      <p>Black tie optional</p>
    </div>
    <canvas class="scratchCanvas" width="300" height="180"></canvas>
  </div>

  <p class="hint">Use your finger or mouse to scratch</p>
</section>

<section class="countdown">
  <h2>Countdown to our big day</h2>
  <div id="timer"></div>
</section>

<footer>
  <p>With love ❤️</p>
</footer>

<canvas id="confettiCanvas"></canvas>

<script src="script.js"></script>
</body>
</html>
